name: Release Artifact

# Publishes @chronary/schemas to npm and creates a GitHub Release.
#
# Provenance posture:
#   - Publishes via npm OIDC Trusted Publishing — no NPM_TOKEN required.
#     The `id-token: write` permission and `registry-url` on setup-node
#     are sufficient once chronary-schemas is registered as a Trusted
#     Publisher for @chronary/schemas on npmjs.com.
#   - npm CLI >= 11.5.1 is required for OIDC trusted publishing; we
#     pin npm to latest before publishing because Node 22 ships with
#     npm 10.x by default.
#   - `npm publish --provenance` records a Sigstore attestation that
#     links the published tarball back to this workflow run.
#   - GitHub artifact attestations also fire on public repos via
#     actions/attest-build-provenance.
#
# Workspace dep posture:
#   - schemas is self-contained (no runtime or build-time dep on other
#     workspace packages — re-checked when the mirror flipped public).
#     If a future change reintroduces a `workspace:*` dep, the build
#     step here will break in the mirror and the fix is a pre-install
#     rewrite of `workspace:*` → an exact npm version, the same pattern
#     used by chronary-toolkit-release-artifact.yml.
#
# Prerequisites (one-time, on flip to public-registry):
#   1. chronary-schemas is public on GitHub.
#   2. First publish must use a classic token from local (npm has no
#      "Pending Publisher" flow — see npm/cli#8544). After that, register
#      Trusted Publisher on npmjs.com → @chronary/schemas → Access tab →
#      repo `Chronary/chronary-schemas`, workflow `release-artifact.yml`,
#      environment blank.
#   3. NPM_TOKEN repo secret (if any) has been deleted.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          # npm install -g npm@latest fails when the runner's bundled npm is incomplete
          # (e.g. missing promise-retry on Node 22.22+). Bypass by downloading the
          # tarball directly into the existing module directory.
          NPM_DIR="$(node -e "process.stdout.write(require('path').resolve(process.execPath,'../../lib/node_modules/npm'))")"
          curl -fsSL https://registry.npmjs.org/npm/-/npm-11.5.1.tgz -o /tmp/npm.tgz
          tar -xzf /tmp/npm.tgz --strip-components=1 -C "$NPM_DIR"
          npm --version

      - name: Validate release manifest
        id: manifest
        run: |
          node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('.chronary-release.json','utf8')); if (manifest.artifact !== 'schemas') throw new Error('Expected artifact schemas'); if (manifest.public_tag !== process.env.GITHUB_REF_NAME) throw new Error('Tag mismatch between manifest and workflow ref'); require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'publish_registry=' + String(Boolean(manifest.publish_registry)) + '\n');"
          test -f RELEASE_NOTES.txt

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate package contents
        run: |
          test -f README.md
          test -f LICENSE
          test -f CHANGELOG.md

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack tarball
        run: pnpm pack

      - name: Attest build provenance for npm tarball
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.tgz'

      - name: Publish to npm
        if: steps.manifest.outputs.publish_registry == 'true'
        run: npm publish *.tgz --provenance --access public

      - name: Create GitHub Release
        run: |
          gh release create "${GITHUB_REF_NAME}" *.tgz \
            --title "@chronary/schemas ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.txt
